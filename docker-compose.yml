services:
  neo4j:
    image: neo4j:5.22
    container_name: evoluipc-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-12345678}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p ${NEO4J_PASSWORD:-12345678} \"RETURN 1\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  engine:
    build:
      context: ./evoluipc-engine
      dockerfile: Dockerfile
    container_name: evoluipc-engine
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-12345678}
      NEO4J_DATABASE: neo4j
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/api/recommendations/me', timeout=5)"]
      interval: 10s
      timeout: 10s
      retries: 12

  django:
    build:
      context: ./django
      dockerfile: Dockerfile
    container_name: evoluipc-django
    restart: unless-stopped
    depends_on:
      engine:
        condition: service_healthy
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_CORS_ALLOWED_ORIGINS: "http://127.0.0.1:4173,http://localhost:4173"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-12345678}
      NEO4J_DATABASE: neo4j
    command: sh -c "python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request, urllib.error; req=urllib.request.Request('http://127.0.0.1:8000/api/auth/me');\ntry:\n  code=urllib.request.urlopen(req, timeout=5).getcode()\nexcept urllib.error.HTTPError as e:\n  code=e.code\nraise SystemExit(0 if code in (200, 401) else 1)",
        ]
      interval: 10s
      timeout: 10s
      retries: 12

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evoluipc-frontend
    restart: unless-stopped
    depends_on:
      django:
        condition: service_started
      engine:
        condition: service_started
    ports:
      - "4173:4173"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4173', timeout=5)"]
      interval: 10s
      timeout: 10s
      retries: 12

volumes:
  neo4j_data:
  neo4j_logs:
